kind = "web"
previewPath = "/"
title = "Salon"
version = "1.0.0"
id = "artifacts/salon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22979

[services.development]
run = "pnpm --filter @workspace/salon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/salon", "run", "build" ]
publicDir = "artifacts/salon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22979"
BASE_PATH = "/"
